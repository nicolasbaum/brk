name: brk

services:
  brk:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: brk:latest
    container_name: brk
    restart: unless-stopped
    ports:
      - 7070:3110
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${BITCOIN_DATA_DIR:-/path/to/bitcoin}:/bitcoin:ro
      - ${BRK_DATA_VOLUME:-brk-data}:/home/brk/.brk
      # Bind mount alternative (uncomment and set BRK_DATA_DIR in .env):
      # - ${BRK_DATA_DIR:-./brk-data}:/home/brk/.brk
    command:
      - --bitcoindir
      - /bitcoin
      - --blocksdir
      - /bitcoin/blocks
      - --brkdir
      - /home/brk/.brk
      - --rpcconnect
      - "${BTC_RPC_HOST:-host.docker.internal}"
      - --rpccookiefile
      - /bitcoin/.cookie
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3110/api/server/sync"]
      interval: 30s
      retries: 3
      start_period: 30s
      timeout: 10s

volumes:
  brk-data:
    driver: local
